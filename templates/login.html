{% extends 'base.html' %}

{% block title %}Login - Articulax{% endblock %}

{% block body %}
<section class="auth-wrapper">
    <div class="card auth-card">
        <h1>Login</h1>
        <p class="subtext">Sign in to continue to your dashboard.</p>

        <form method="POST" id="loginForm" class="auth-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" id="login_password" placeholder="Password" required>
            <button type="submit" class="primary-btn">Login</button>
        </form>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}
    </div>
</section>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
